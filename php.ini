[PHP]
; General PHP configuration for voting system

; Timezone
date.timezone = UTC

; Display errors
display_errors = 1
display_startup_errors = 1
error_reporting = E_ALL

; Session configuration
session.save_path = "/tmp"
session.name = "VOTINGSESSID"

; Upload limits
upload_max_filesize = 10M
post_max_size = 10M

; Memory limit
memory_limit = 256M

; Maximum execution time
max_execution_time = 300
